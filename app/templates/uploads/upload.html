{% extends "layouts/base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>📂 Upload Cloud Billing Report</h2>

    <hr>

    <div class="card p-4">

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">

                <label class="form-label">
                    Select Billing CSV
                </label>

                <input
                    type="file"
                    name="billing_file"
                    class="form-control"
                    accept=".csv"
                    required>

            </div>

            <button class="btn btn-primary">
                Upload Report
            </button>

        </form>

        <hr>

        {% if table %}

            <h4 class="mt-4">
                CSV Preview
            </h4>

            {{ table|safe }}

        {% endif %}

    </div>

</div>

{% endblock %}
